<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E0D0"/>
      <stop offset="100%" stop-color="#E8DEC8"/>
    </linearGradient>
    <linearGradient id="side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A3010"/>
      <stop offset="100%" stop-color="#5A3A08"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Dark left panel -->
  <rect x="0" y="0" width="520" height="640" fill="url(#side)"/>
  <!-- Gear motif in left panel -->
  <g transform="translate(260,320)" opacity="0.15" stroke="#FAF0DC" fill="none" stroke-width="2">
    <circle r="160"/>
    <circle r="130"/>
    <circle r="40"/>
    <g stroke-width="3">
      <rect x="-10" y="-172" width="20" height="28" rx="2"/>
      <rect x="-10" y="144" width="20" height="28" rx="2"/>
      <rect x="-172" y="-10" width="28" height="20" rx="2"/>
      <rect x="144" y="-10" width="28" height="20" rx="2"/>
      <g transform="rotate(45)"><rect x="-10" y="-172" width="20" height="28" rx="2"/></g>
      <g transform="rotate(90)"><rect x="-10" y="-172" width="20" height="28" rx="2"/></g>
      <g transform="rotate(135)"><rect x="-10" y="-172" width="20" height="28" rx="2"/></g>
      <g transform="rotate(225)"><rect x="-10" y="-172" width="20" height="28" rx="2"/></g>
      <g transform="rotate(270)"><rect x="-10" y="-172" width="20" height="28" rx="2"/></g>
      <g transform="rotate(315)"><rect x="-10" y="-172" width="20" height="28" rx="2"/></g>
    </g>
    <line x1="-40" y1="0" x2="-130" y2="0"/>
    <line x1="40" y1="0" x2="130" y2="0"/>
    <line x1="0" y1="-40" x2="0" y2="-130"/>
    <line x1="0" y1="40" x2="0" y2="130"/>
  </g>
  <!-- Title text on dark panel -->
  <text x="260" y="265" font-family="Georgia, serif" font-size="52" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="3">SOLAR</text>
  <text x="260" y="330" font-family="Georgia, serif" font-size="52" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="3">SCORCH</text>
  <!-- Rule -->
  <line x1="520" y1="0" x2="520" y2="640" stroke="#C9A84C" stroke-width="3"/>
  <!-- Right panel content -->
  <text x="900" y="260" font-family="Georgia, serif" font-size="24" font-style="italic"
        fill="#5C3D1E" text-anchor="middle" letter-spacing="1">CA673 Solar Geometry · Saint John · 1518</text>
  <line x1="600" y1="310" x2="1200" y2="310" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
  <text x="900" y="370" font-family="Georgia, serif" font-size="16"
        fill="#8B6914" text-anchor="middle" letter-spacing="2">RICHARD STEVEN VALLANCE (DA VALENCA)</text>
  <text x="900" y="405" font-family="Georgia, serif" font-size="13"
        fill="#A08040" text-anchor="middle">The People Focused Group · 2026</text>
  <!-- Annotation lines decorative -->
  <g opacity="0.2" stroke="#5C3D1E" stroke-width="0.8">
    <line x1="620" y1="440" x2="1180" y2="440"/>
    <line x1="620" y1="455" x2="1160" y2="455"/>
    <line x1="620" y1="470" x2="1175" y2="470"/>
  </g>
  <!-- DA VALENCA watermark bottom -->
  <text x="900" y="590" font-family="Georgia, serif" font-size="11"
        fill="#8B6914" text-anchor="middle" letter-spacing="4" opacity="0.5">DA VALENCA ARCHIVE</text>
</svg>